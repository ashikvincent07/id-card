<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>id-card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card-background">
        <div class="card">
            <div class="photo-logo">
                <div class="photo">
                    <img src="./images/leo_.jpeg" alt="">
                </div>
                <div class="logo">
                    <img src="./images/pngwing.com.png" alt="">
                </div>
            </div>
            <div class="id-name">
                <div class="first-name">
                    <span class="text-navy-blue text-bolder">Leonardo</span>
                </div>
                <div class="last-name">
                    <span class="text-navy-blue text-bolder">Decaprio</span>
                </div>
                
            </div>
            <div class="role">
                <span class="role-text">Project Manager</span>
            </div>
            <div class="details">
                <div class="id-no">
                    <span class="text-navy-blue"><strong>ID No: </strong>8346-721938-237</span>
                </div>
                <div class="email">
                    <span class="text-navy-blue"><strong>Email: </strong>leo@gmail.com</span>
                </div>
                <div class="social">
                    <span class="text-navy-blue"><strong>Social: </strong>@leo.site</span>
                </div>
                <div class="phone">
                    <span class="text-navy-blue"><strong>Phone: </strong>234-765-3456</span>
                </div>
            </div>
            <div class="bar-code">
                <img src="./images/—Pngtree—black and white icons for_7554658.png" alt="">
            </div>
        </div>
    </div>
</body>
</html>
